<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة رمضان </title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ==================== المتغيرات ==================== */
        :root {
            --night: #04080F;
            --dark1: #0A1628;
            --dark2: #0F1F3D;
            --dark3: #162950;
            --gold: #D4A843;
            --gold2: #F0C96A;
            --gold3: #B8860B;
            --teal: #1A7A6A;
            --teal2: #26B59A;
            --cream: #F5E6C8;
            --text: #EDE0C4;
            --muted: #8A9BB5;
            --panel: rgba(15,31,61,0.85);
            --border: rgba(212,168,67,0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            background: var(--night);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            position: relative;
        }

        /* ==================== الخلفية المتحركة ==================== */
        #sky-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ==================== الفانوس المتحرك ==================== */
        .lanterns-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1;
            pointer-events: none;
            height: 200px;
        }

        .lantern {
            position: absolute;
            top: 40px;
            transform: translateX(-50%);
            animation: lanternSwing 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(212,168,67,0.7));
        }

        .lantern svg {
            display: block;
        }

        @keyframes lanternSwing {
            0%, 100% { transform: translateX(-50%) rotate(-8deg); }
            50% { transform: translateX(-50%) rotate(8deg); }
        }

        .lantern:nth-child(2n) { animation-duration: 5s; animation-delay: -1s; }
        .lantern:nth-child(3n) { animation-duration: 3.5s; animation-delay: -2s; }

        /* ==================== القمر ==================== */
        .moon-container {
            position: fixed;
            top: 30px;
            right: 60px;
            z-index: 2;
            pointer-events: none;
        }

        .moon {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #FFF9E6, #FFD700 40%, #D4A843 80%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255,215,0,0.4), 0 0 80px rgba(212,168,67,0.2);
            animation: moonGlow 4s ease-in-out infinite;
            position: relative;
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 12px;
            width: 58px;
            height: 58px;
            background: var(--dark1);
            border-radius: 50%;
            transform: translate(12px, -8px);
        }

        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(255,215,0,0.4), 0 0 80px rgba(212,168,67,0.2); }
            50% { box-shadow: 0 0 50px rgba(255,215,0,0.6), 0 0 120px rgba(212,168,67,0.35); }
        }

        /* ==================== الصفحات ==================== */
        .page {
            display: none;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            flex-direction: column;
            padding-bottom: 2rem;
        }

        .page.active {
            display: flex;
        }

        /* ==================== صفحة التسجيل ==================== */
        #page-login {
            align-items: center;
            justify-content: center;
            padding: 40px 2rem;
            min-height: auto;
        }

        .login-card {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.8s ease;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-title {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--gold2), var(--gold), #C8960A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeInDown 1s ease forwards;
        }

        .login-subtitle {
            color: var(--muted);
            text-align: center;
            font-size: 1rem;
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
            animation: fadeInDown 1.2s ease forwards;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: var(--gold);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .form-input,
        .form-select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            padding: 0.8rem 1.2rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212,168,67,0.3);
            background: rgba(255,255,255,0.08);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--dark1);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
            letter-spacing: 0.1em;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212,168,67,0.4);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        /* ==================== صفحة اللعبة ==================== */
        #page-game {
            align-items: center;
            justify-content: flex-start;
            padding: 30px 2rem;
            gap: 1rem;
            min-height: auto;
        }

        .game-wrapper {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.8s ease;
        }

        .game-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .game-title {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--gold2), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .stat-box {
            background: rgba(212,168,67,0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.3rem;
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-size: 1.8rem;
            color: var(--gold);
            font-weight: 700;
        }

        .game-board {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            z-index: 2;
        }

        .game-row {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            align-items: center;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(212,168,67,0.05));
            border: 2px solid var(--gold3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(212,168,67,0.2);
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent);
            border-radius: 50%;
        }

        .cell:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(212,168,67,0.4);
            border-color: var(--gold2);
        }

        .cell.selectable {
            border: 2px dashed var(--gold2);
            background: rgba(212,168,67,0.15);
            animation: glow 0.6s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(212,168,67,0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(212,168,67,0.5);
            }
        }

        .cell.selected {
            border-color: var(--gold);
            background: rgba(212,168,67,0.3);
            box-shadow: 0 0 40px rgba(212,168,67,0.6);
            transform: scale(1.15);
        }

        .line-under-cell {
            width: 55px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 2px;
            margin-top: -5px;
        }

        .player-info {
            background: rgba(212,168,67,0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            transition: all 0.4s;
            position: relative;
            z-index: 2;
        }

        .player-info.active {
            background: rgba(212,168,67,0.25);
            border-color: var(--gold);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212,168,67,0.3);
        }

        .player-name {
            font-size: 1.2rem;
            color: var(--gold2);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .timer {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold2);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.3em;
        }

        .timer.warning {
            animation: pulse 0.5s ease-in-out infinite;
            color: #FF6B6B;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--dark1);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212,168,67,0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-secondary:hover {
            background: rgba(212,168,67,0.1);
            border-color: var(--gold2);
        }

        .status-message {
            text-align: center;
            font-size: 1.1rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            position: relative;
            z-index: 2;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.success {
            background: linear-gradient(135deg, #2ECC71, #27AE60);
            border: 1px solid #27AE60;
        }

        .status-message.error {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            border: 1px solid #C0392B;
        }

        .status-message.info {
            background: linear-gradient(135deg, #3498DB, #2980B9);
            border: 1px solid #2980B9;
        }

        /* ==================== Scrollbar ==================== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold2);
        }

        /* ==================== Particle ==================== */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            animation: particleFloat 2s ease-out forwards;
            z-index: 15;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>
<body>
    <!-- الخلفية المتحركة -->
    <canvas id="sky-canvas"></canvas>

    <!-- الفوانيس المتحركة -->
    <div class="lanterns-container" id="lanterns-container"></div>

    <!-- القمر -->
    <div class="moon-container">
        <div class="moon"></div>
    </div>

    <!-- صفحة التسجيل -->
    <div class="page active" id="page-login">
        <div class="login-card">
            <h1 class="login-title">🏮 لعبة رمضان الفاخرة 🏮</h1>
            <p class="login-subtitle">✨ تجربة لعب استثنائية في شهر الخير ✨</p>

            <form onsubmit="startGame(event)">
                <div class="form-group">
                    <label class="form-label">👤 اسمك:</label>
                    <input type="text" class="form-input" id="playerName" placeholder="أدخل اسمك" required>
                </div>

                <div class="form-group">
                    <label class="form-label">⚔️ وضع اللعب:</label>
                    <select class="form-select" id="gameMode">
                        <option value="pvp">ضد لاعب آخر</option>
                        <option value="ai">ضد الكمبيوتر</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">⚡ مستوى الصعوبة:</label>
                    <select class="form-select" id="gameLevel">
                        <option value="easy">🟢 سهل (10 ثواني)</option>
                        <option value="medium">🟡 متوسط (7 ثواني)</option>
                        <option value="hard">🔴 صعب (5 ثواني)</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">🎮 ابدأ اللعبة الآن!</button>
            </form>
        </div>
    </div>

    <!-- صفحة اللعبة -->
    <div class="page" id="page-game">
        <div class="game-wrapper">
            <div class="game-header">
                <h2 class="game-title">🍪 لعبة الكوكيز المثيرة 🍪</h2>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; position: relative; z-index: 2;">
                    <div style="color: var(--gold);">👤 <span id="playerDisplay">اللاعب</span></div>
                    <button class="btn btn-secondary" onclick="backToLogin()" style="font-size: 0.9rem;">🚪 خروج</button>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-box">
                    <div class="stat-label">الانتصارات</div>
                    <div class="stat-value" id="wins">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">الخسائر</div>
                    <div class="stat-value" id="losses">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">الحركات</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">الوقت</div>
                    <div class="stat-value" id="time">0s</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; position: relative; z-index: 2;">
                <div class="player-info active" id="player1Info">
                    <div class="player-name" id="player1Name">🔴 اللاعب الأول</div>
                    <div class="timer" id="player1Timer">10</div>
                </div>
                <div class="player-info" id="player2Info">
                    <div class="player-name" id="player2Name">🔵 اللاعب الثاني</div>
                    <div class="timer" id="player2Timer">10</div>
                </div>
            </div>

            <div class="game-board" id="gameBoard"></div>

            <div class="status-message info" id="statusMessage">اضغط ابدأ اللعبة للبدء! 🎮</div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="beginGame()">🎮 ابدأ اللعبة</button>
                <button class="btn btn-secondary" onclick="resetGame()">🔄 إعادة تعيين</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== متغيرات اللعبة ====================
        let gameConfig = {
            playerName: '',
            gameMode: 'pvp',
            gameLevel: 'easy',
            timers: { easy: 10, medium: 7, hard: 5 }
        };

        let gameData = {
            board: [
                ['p1', 'p1', 'p1'],
                [null, null, null],
                [null, null, null],
                ['p2', 'p2', 'p2']
            ],
            currentPlayer: 'p1',
            gameActive: false,
            selectedPiece: null,
            moveCount: 0,
            stats: {
                wins: 0,
                losses: 0,
                moves: 0,
                startTime: 0
            }
        };

        let timerState = {
            timerInterval: null,
            currentTime: 10
        };

        // ==================== دوال التسجيل ====================
        function startGame(e) {
            e.preventDefault();

            gameConfig.playerName = document.getElementById('playerName').value;
            gameConfig.gameMode = document.getElementById('gameMode').value;
            gameConfig.gameLevel = document.getElementById('gameLevel').value;

            document.getElementById('page-login').classList.remove('active');
            document.getElementById('page-game').classList.add('active');

            document.getElementById('playerDisplay').textContent = gameConfig.playerName;
            document.getElementById('player1Name').textContent = `🔴 ${gameConfig.playerName}`;
            document.getElementById('player2Name').textContent = gameConfig.gameMode === 'ai' ? '🤖 الكمبيوتر الذكي' : '🔵 اللاعب الثاني';

            initializeBoard();
            updateDisplay();
        }

        function backToLogin() {
            if (confirm('هل تريد العودة؟')) {
                clearInterval(timerState.timerInterval);
                gameData.gameActive = false;
                document.getElementById('page-game').classList.remove('active');
                document.getElementById('page-login').classList.add('active');
                document.getElementById('playerName').value = '';
                resetStats();
            }
        }

        // ==================== دوال اللعبة ====================
        function initializeBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            for (let row = 0; row < 4; row++) {
                const gameRow = document.createElement('div');
                gameRow.className = 'game-row';

                for (let col = 0; col < 3; col++) {
                    const cellWrapper = document.createElement('div');
                    cellWrapper.style.display = 'flex';
                    cellWrapper.style.flexDirection = 'column';
                    cellWrapper.style.alignItems = 'center';
                    cellWrapper.style.gap = '0.5rem';

                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${row}-${col}`;
                    cell.onclick = () => handleCellClick(row, col);

                    const piece = gameData.board[row][col];
                    if (piece) {
                        cell.textContent = '🍪';
                        cell.dataset.piece = piece;
                        cell.onclick = (e) => {
                            e.stopPropagation();
                            selectPiece(row, col);
                        };
                    }

                    const line = document.createElement('div');
                    line.className = 'line-under-cell';

                    cellWrapper.appendChild(cell);
                    cellWrapper.appendChild(line);
                    gameRow.appendChild(cellWrapper);
                }

                board.appendChild(gameRow);
            }
        }

        function selectPiece(row, col) {
            if (!gameData.gameActive) {
                showStatus('ابدأ اللعبة أولاً!', 'error');
                return;
            }

            const piece = gameData.board[row][col];
            if (piece !== gameData.currentPlayer) {
                showStatus('اختر قطعتك فقط!', 'error');
                return;
            }

            gameData.selectedPiece = { row, col };
            clearSelection();
            highlightMoves(row, col);
            showStatus('اختر الخانة المراد الانتقال إليها', 'info');
        }

        function highlightMoves(row, col) {
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];

            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;

                if (newRow >= 0 && newRow < 4 && newCol >= 0 && newCol < 3 && gameData.board[newRow][newCol] === null) {
                    const cell = document.getElementById(`cell-${newRow}-${newCol}`);
                    if (cell) cell.classList.add('selectable');
                }
            }
        }

        function handleCellClick(row, col) {
            if (!gameData.selectedPiece || !gameData.gameActive) return;

            const { row: sr, col: sc } = gameData.selectedPiece;
            const rowDiff = Math.abs(row - sr);
            const colDiff = Math.abs(col - sc);

            if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                if (gameData.board[row][col] === null) {
                    gameData.board[row][col] = gameData.board[sr][sc];
                    gameData.board[sr][sc] = null;
                    gameData.selectedPiece = null;
                    gameData.stats.moves++;
                    updateDisplay();
                    playSound('move');

                    if (checkWin(gameData.currentPlayer)) {
                        playSound('win');
                        endGame(gameData.currentPlayer);
                        return;
                    }

                    gameData.currentPlayer = gameData.currentPlayer === 'p1' ? 'p2' : 'p1';
                    
                    if (gameConfig.gameMode === 'ai' && gameData.currentPlayer === 'p2') {
                        setTimeout(() => makeAIMove(), 800);
                    }

                    clearSelection();
                    initializeBoard();
                    resetTimer();
                    updateDisplay();
                }
            }
        }

        function makeAIMove() {
            const moves = [];
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 3; col++) {
                    if (gameData.board[row][col] === 'p2') {
                        const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                        for (const [dr, dc] of directions) {
                            const nr = row + dr;
                            const nc = col + dc;
                            if (nr >= 0 && nr < 4 && nc >= 0 && nc < 3 && gameData.board[nr][nc] === null) {
                                moves.push({ fr: row, fc: col, tr: nr, tc: nc });
                            }
                        }
                    }
                }
            }

            if (moves.length > 0) {
                const { fr, fc, tr, tc } = moves[Math.floor(Math.random() * moves.length)];
                gameData.board[tr][tc] = gameData.board[fr][fc];
                gameData.board[fr][fc] = null;
                gameData.stats.moves++;

                if (checkWin('p2')) {
                    playSound('win');
                    endGame('p2');
                    return;
                }

                gameData.currentPlayer = 'p1';
                clearSelection();
                initializeBoard();
                resetTimer();
                updateDisplay();
            } else {
                endGame('p1');
            }
        }

        function checkWin(player) {
            if (player === 'p1') {
                return gameData.board[3][0] === 'p1' && gameData.board[3][1] === 'p1' && gameData.board[3][2] === 'p1';
            } else {
                return gameData.board[0][0] === 'p2' && gameData.board[0][1] === 'p2' && gameData.board[0][2] === 'p2';
            }
        }

        function clearSelection() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selectable', 'selected'));
        }

        function beginGame() {
            gameData.gameActive = true;
            gameData.currentPlayer = 'p1';
            gameData.stats.startTime = Date.now();
            resetTimer();
            updateDisplay();
            startTimer();
            showStatus(`بدء اللعبة! دور ${gameConfig.playerName} 🔴`, 'success');
            playSound('start');
        }

        function resetGame() {
            clearInterval(timerState.timerInterval);
            gameData = {
                board: [
                    ['p1', 'p1', 'p1'],
                    [null, null, null],
                    [null, null, null],
                    ['p2', 'p2', 'p2']
                ],
                currentPlayer: 'p1',
                gameActive: false,
                selectedPiece: null,
                moveCount: 0,
                stats: gameData.stats
            };
            initializeBoard();
            clearSelection();
            resetTimer();
            updateDisplay();
            showStatus('تم إعادة تعيين اللعبة. اضغط ابدأ اللعبة! 🎮', 'info');
        }

        function resetTimer() {
            timerState.currentTime = gameConfig.timers[gameConfig.gameLevel];
            updateTimerDisplay();
        }

        function startTimer() {
            clearInterval(timerState.timerInterval);
            timerState.timerInterval = setInterval(() => {
                timerState.currentTime--;
                updateTimerDisplay();

                if (timerState.currentTime <= 0) {
                    clearInterval(timerState.timerInterval);
                    playSound('timeout');
                    endGame(gameData.currentPlayer === 'p1' ? 'p2' : 'p1');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const p1 = document.getElementById('player1Timer');
            const p2 = document.getElementById('player2Timer');

            if (gameData.currentPlayer === 'p1') {
                p1.textContent = timerState.currentTime;
                p1.parentElement.classList.toggle('warning', timerState.currentTime <= 3);
                p2.textContent = '—';
                p2.parentElement.classList.remove('warning');
            } else {
                p2.textContent = timerState.currentTime;
                p2.parentElement.classList.toggle('warning', timerState.currentTime <= 3);
                p1.textContent = '—';
                p1.parentElement.classList.remove('warning');
            }
        }

        function updateDisplay() {
            document.getElementById('player1Info').classList.toggle('active', gameData.currentPlayer === 'p1');
            document.getElementById('player2Info').classList.toggle('active', gameData.currentPlayer === 'p2');
            document.getElementById('moves').textContent = gameData.stats.moves;
            document.getElementById('wins').textContent = gameData.stats.wins;
            document.getElementById('losses').textContent = gameData.stats.losses;
        }

        function endGame(winner) {
            clearInterval(timerState.timerInterval);
            gameData.gameActive = false;

            if (winner === 'p1') {
                gameData.stats.wins++;
            } else {
                gameData.stats.losses++;
            }

            updateDisplay();
            const winnerName = winner === 'p1' ? `🔴 ${gameConfig.playerName}` : '🤖 الكمبيوتر';
            showStatus(`انتهت اللعبة! الفائز: ${winnerName}`, 'success');
            playSound('win');
            spawnConfetti();
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = `status-message ${type}`;
        }

        function resetStats() {
            gameData.stats = { wins: 0, losses: 0, moves: 0, startTime: 0 };
            updateDisplay();
        }

        function spawnConfetti() {
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'particle';
                el.textContent = ['🎉', '✨', '🌟', '💫', '🎊'][Math.floor(Math.random() * 5)];
                el.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    --tx: ${(Math.random() - 0.5) * 300}px;
                    --ty: ${-200 - Math.random() * 200}px;
                `;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        }

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                const sounds = {
                    move: { f: 600, d: 0.15 },
                    win: { f: 1000, d: 0.3 },
                    start: { f: 700, d: 0.2 },
                    error: { f: 300, d: 0.2 },
                    timeout: { f: 200, d: 0.4 }
                };

                if (sounds[type]) {
                    const { f, d } = sounds[type];
                    osc.frequency.value = f;
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + d);
                }
            } catch (e) { }
        }

        // ==================== الخلفية المتحركة ====================
        (function() {
            const canvas = document.getElementById('sky-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, stars = [], shootingStars = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                buildStars();
            }

            function buildStars() {
                stars = [];
                for (let i = 0; i < 200; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H * 0.6,
                        r: Math.random() * 1.5 + 0.3,
                        alpha: Math.random(),
                        speed: 0.003 + Math.random() * 0.008,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            let t = 0;
            function draw() {
                ctx.clearRect(0, 0, W, H);

                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#040810');
                grad.addColorStop(0.3, '#081525');
                grad.addColorStop(0.6, '#0A1A35');
                grad.addColorStop(1, '#0D1E3D');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                t += 0.016;

                stars.forEach(s => {
                    const a = 0.4 + 0.6 * Math.abs(Math.sin(s.phase + t * s.speed * 50));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,245,200,${a})`;
                    ctx.fill();
                });

                if (Math.random() < 0.002) {
                    shootingStars.push({
                        x: Math.random() * W * 0.8,
                        y: Math.random() * H * 0.3,
                        vx: 3 + Math.random() * 4,
                        vy: 1.5 + Math.random() * 2,
                        len: 80 + Math.random() * 60,
                        alpha: 1
                    });
                }

                shootingStars = shootingStars.filter(ss => ss.alpha > 0);
                shootingStars.forEach(ss => {
                    const g = ctx.createLinearGradient(ss.x, ss.y, ss.x - ss.len, ss.y - ss.len * 0.5);
                    g.addColorStop(0, `rgba(255,240,160,${ss.alpha})`);
                    g.addColorStop(1, 'rgba(255,240,160,0)');
                    ctx.beginPath();
                    ctx.moveTo(ss.x, ss.y);
                    ctx.lineTo(ss.x - ss.len, ss.y - ss.len * 0.5);
                    ctx.strokeStyle = g;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ss.x += ss.vx;
                    ss.y += ss.vy;
                    ss.alpha -= 0.016;
                });

                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            draw();
        })();

        // ==================== الفوانيس ====================
        (function() {
            const container = document.getElementById('lanterns-container');
            const colors = [
                ['#C44E2A', '#FF9966'],
                ['#1A6B9A', '#5BC8F0'],
                ['#D4A843', '#FFE085'],
                ['#6B2AC4', '#B87DFF'],
                ['#1A7A4A', '#3ECC80'],
                ['#C4472A', '#FF8866'],
                ['#2A6BC4', '#66AAFF'],
                ['#C4A32A', '#FFD966']
            ];

            for (let i = 0; i < 8; i++) {
                const lantern = document.createElement('div');
                lantern.className = 'lantern';
                lantern.style.left = (i / 7) * 95 + 2 + '%';
                lantern.style.animationDelay = (i * 0.6) + 's';

                const [c1, c2] = colors[i];
                lantern.innerHTML = `<svg width="28" height="44" viewBox="0 0 28 44">
                    <defs>
                        <linearGradient id="lg${i}">
                            <stop offset="0%" style="stop-color:${c2}"/>
                            <stop offset="100%" style="stop-color:${c1}"/>
                        </linearGradient>
                    </defs>
                    <path d="M4,8 Q14,5 24,8 L26,36 Q14,39 2,36 Z" fill="url(#lg${i})" opacity="0.9"/>
                    <ellipse cx="14" cy="22" rx="6" ry="8" fill="${c2}" opacity="0.2"/>
                </svg>`;

                container.appendChild(lantern);
            }
        })();
    </script>
